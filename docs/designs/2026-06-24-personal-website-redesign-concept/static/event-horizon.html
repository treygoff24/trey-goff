<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Horizon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Event Horizon — Original Schwarzschild black hole
// Verlet geodesic integration, Novikov-Thorne disk, Doppler beaming
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform float u_rotationSpeed;
uniform float u_diskIntensity;
uniform float u_starsOnly;
uniform float u_tilt;
uniform float u_rotate;
uniform vec2 u_bhCenter;
uniform float u_bhScale;
uniform float u_chromatic;

// ──── Constants ────
const float PI = 3.14159265359;
const float TAU = 6.28318530718;
const float RS = 1.0;        // Schwarzschild radius
const float ISCO = 3.0;      // Innermost stable circular orbit
const float DISK_IN = 2.2;   // Inner glow edge (infalling material)
const float DISK_OUT = 14.0;  // Outer disk edge

// ──────────────────────────────────────────
// Hash — PCG-inspired, no sin()
// ──────────────────────────────────────────
float hash(vec2 p) {
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
}

// ──────────────────────────────────────────
// Gradient noise with quintic interpolation
// ──────────────────────────────────────────
float gNoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
    return mix(
        mix(hash(i), hash(i + vec2(1, 0)), u.x),
        mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), u.x),
        u.y
    );
}

// ──────────────────────────────────────────
// FBM with domain rotation (reduces grid artifacts)
// ──────────────────────────────────────────
float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    mat2 rot = mat2(0.866, 0.5, -0.5, 0.866); // 30 deg rotation
    for (int i = 0; i < 4; i++) {
        v += a * gNoise(p);
        p = rot * p * 2.03 + vec2(47.0, 13.0);
        a *= 0.49;
    }
    return v;
}
// Lightweight 2-octave noise for subtle effects (nebula etc.)
float fbmLite(vec2 p) {
    float v = 0.5 * gNoise(p);
    p = mat2(0.866, 0.5, -0.5, 0.866) * p * 2.03 + vec2(47.0, 13.0);
    v += 0.25 * gNoise(p);
    return v;
}

// ──────────────────────────────────────────
// Star field — cell-based with spherical UV
// ──────────────────────────────────────────
vec3 starField(vec3 rd) {
    float u = atan(rd.z, rd.x) / TAU + 0.5;
    float v = asin(clamp(rd.y, -0.999, 0.999)) / PI + 0.5;
    vec3 col = vec3(0.0);

    // Bright sparse stars
    {
        vec2 cell = floor(vec2(u, v) * 55.0);
        vec2 f = fract(vec2(u, v) * 55.0);
        vec2 r = vec2(hash(cell), hash(cell + 127.1));
        float d = length(f - r);
        float b = pow(r.x, 10.0) * exp(-d * d * 500.0);
        col += mix(vec3(1.0, 0.65, 0.35), vec3(0.55, 0.75, 1.0), r.y) * b * 4.0;
    }
    // Medium density stars
    {
        vec2 cell = floor(vec2(u, v) * 170.0);
        vec2 f = fract(vec2(u, v) * 170.0);
        vec2 r = vec2(hash(cell + 43.0), hash(cell + 91.0));
        float d = length(f - r);
        float b = pow(r.x, 18.0) * exp(-d * d * 1000.0);
        col += vec3(0.85, 0.88, 1.0) * b * 2.0;
    }
    // Subtle nebula (lite noise — pow(3) crushes detail anyway)
    float n = fbmLite(vec2(u, v) * 3.0) * fbmLite(vec2(u, v) * 5.5 + 10.0);
    col += vec3(0.10, 0.04, 0.14) * pow(n, 3.0);

    return col;
}

// ──────────────────────────────────────────
// Blackbody color (physically motivated)
// ──────────────────────────────────────────
vec3 bbColor(float t) {
    t = clamp(t, 0.0, 2.5);
    vec3 lo = vec3(1.0, 0.18, 0.0);    // deep red     (~1500K)
    vec3 mi = vec3(1.0, 0.55, 0.12);   // orange       (~3500K)
    vec3 hi = vec3(1.0, 0.93, 0.82);   // warm white   (~8000K)
    vec3 hot = vec3(0.65, 0.82, 1.0);  // cool blue-wh (~15000K)
    vec3 c = mix(lo, mi, smoothstep(0.0, 0.3, t));
    c = mix(c, hi, smoothstep(0.3, 0.8, t));
    return mix(c, hot, smoothstep(0.8, 1.8, t));
}

// ──────────────────────────────────────────
// Accretion disk shading
//   Novikov-Thorne temperature profile
//   FBM turbulence + spiral arms
//   Doppler beaming + gravitational redshift
// ──────────────────────────────────────────
vec4 shadeDisk(vec3 hit, vec3 vel, float time) {
    float r = length(hit.xz);
    if (r < DISK_IN * 0.5 || r > DISK_OUT * 1.05) return vec4(0.0);

    // Novikov-Thorne: T proportional to r^-3/4 (1 - sqrt(r_isco/r))^1/4
    float xr = ISCO / r;
    float tProfile = pow(ISCO / r, 0.75) * pow(max(0.001, 1.0 - sqrt(xr)), 0.25);

    // Gravitational redshift: observed temp = emitted * sqrt(1 - RS/r)
    float gRedshift = sqrt(max(0.01, 1.0 - RS / r));
    tProfile *= gRedshift;

    // Disk texture with Keplerian differential rotation
    float phi = atan(hit.z, hit.x);
    float lr = log2(max(r, 0.1));

    // Keplerian angular velocity with a floor so outer disk still moves
    float keplerOmega = sqrt(0.5 * RS / (r * r * r));
    float baseOmega = 0.04; // minimum rotation for outer rings
    float omega = max(keplerOmega, baseOmega) * 10.0;
    float rotAngle = time * omega;
    float ca = cos(rotAngle), sa = sin(rotAngle);
    vec2 rotXZ = vec2(hit.x * ca - hit.z * sa, hit.x * sa + hit.z * ca);

    // FBM turbulence — the primary texture, gives cloudy organic feel
    // Sampled at Keplerian-rotated coords for orbital flow
    float turb = fbm(rotXZ * 1.2 + vec2(lr * 3.0));
    turb = 0.25 + 0.75 * turb;

    // Time-evolving detail layer — single noise call (subtle contribution)
    float timeShift = time * 0.15;
    float detail = gNoise(rotXZ * 3.5 + vec2(100.0 + timeShift, timeShift * 0.7));
    turb *= 0.7 + 0.3 * detail;

    // Concentric ring modulation — visible structure within the clouds
    float ringPhase1 = sin(r * 10.0 + rotAngle * r * 0.3) * 0.5 + 0.5;
    float ringPhase2 = sin(r * 20.0 - rotAngle * r * 0.15) * 0.5 + 0.5;
    float rings = ringPhase1 * 0.55 + ringPhase2 * 0.45;
    rings = 0.5 + 0.5 * rings;
    turb *= rings;

    // Doppler beaming from Keplerian orbital motion
    // Reduced from 3.0 to 2.0 so the receding side stays visible
    float orbSpeed = sqrt(0.5 * RS / max(r, DISK_IN));
    vec3 orbDir = normalize(vec3(-hit.z, 0.0, hit.x));
    float dopplerFactor = 1.0 + 2.0 * dot(normalize(vel), orbDir) * orbSpeed;
    dopplerFactor = max(0.15, dopplerFactor);
    float dopplerBoost = dopplerFactor * dopplerFactor * dopplerFactor;

    // Intensity
    float I = tProfile * turb * 6.0;

    // Edge fades
    float innerFade = smoothstep(DISK_IN * 0.7, DISK_IN * 1.2, r);
    // ISCO fade — emission ramps up beyond ISCO
    float iscoFade = 0.35 + 0.65 * smoothstep(ISCO * 0.85, ISCO * 1.2, r);
    float outerFade = 1.0 - smoothstep(DISK_OUT * 0.55, DISK_OUT, r);
    I *= innerFade * iscoFade * outerFade;

    // Color: temperature + Doppler frequency shift
    // Approaching side: blue-shifted (higher temp), receding: red-shifted (lower temp)
    float colorTemp = tProfile * pow(dopplerFactor, 1.8) * 1.2;
    vec3 col = bbColor(colorTemp) * I * dopplerBoost;

    // Chromatic dispersion: each ring band gets a spectral hue
    if (u_chromatic > 0.01) {
        // Smooth spectral mapping based on radius
        // Uses the actual ring structure phase for band-coherent coloring
        float spectralR = (r - DISK_IN) / (DISK_OUT - DISK_IN);
        float ringP = ringPhase1; // from the ring structure above

        // Combine radial position and ring phase for spectral position
        // This ensures each bright ring band has its own distinct hue
        float hue = spectralR * 0.8 + ringP * 0.4;

        // Full visible spectrum: red → orange → yellow → green → cyan → blue
        vec3 spectrum;
        // Red channel: strong at low hue, returns at high hue (wraps around)
        spectrum.r = (1.0 - smoothstep(0.0, 0.35, hue))  // red at start
                   + smoothstep(0.25, 0.45, hue) * (1.0 - smoothstep(0.55, 0.7, hue)) * 0.7  // orange/yellow
                   + smoothstep(0.85, 1.1, hue) * 0.4; // faint return
        // Green channel: broad peak in the middle (yellow → green → cyan)
        spectrum.g = smoothstep(0.15, 0.4, hue) * (1.0 - smoothstep(0.7, 0.95, hue));
        // Blue channel: peaks at high hue (cyan → blue)
        spectrum.b = smoothstep(0.5, 0.8, hue)
                   + smoothstep(0.85, 1.1, hue) * 0.3; // violet hint
        spectrum = max(spectrum, 0.05);

        // Preserve luminance from the original color
        float luma = dot(col, vec3(0.3, 0.5, 0.2));
        vec3 chromaCol = spectrum * luma * 2.0;

        col = mix(col, chromaCol, u_chromatic * 0.75);
    }

    float alpha = clamp(I * 1.3, 0.0, 0.96);
    return vec4(col, alpha);
}

// ──────────────────────────────────────────
// Main — Schwarzschild geodesic ray tracer
// Uses velocity-Verlet integration of:
//   d²x/dλ² = -1.5 · RS · L² / r⁵ · x
// where L² = |x × v|² is the conserved angular momentum
// ──────────────────────────────────────────
void main() {
    vec2 fc = gl_FragCoord.xy;
    vec2 ctr = (u_bhScale > 0.0 ? u_bhCenter : vec2(0.5)) * u_res;
    float sc = u_bhScale > 0.0 ? u_bhScale : 1.0;
    vec2 uv = (fc - ctr) * sc / u_res.x;

    // Orbital camera
    float camR = 28.0;
    float orbit = u_time * 0.055 * u_rotationSpeed;
    float tilt = 0.25 + u_tilt;

    vec3 eye = vec3(
        camR * cos(orbit) * cos(tilt),
        camR * sin(tilt),
        camR * sin(orbit) * cos(tilt)
    );

    // Look-at basis
    vec3 fwd = normalize(-eye);
    vec3 rt = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
    vec3 up = cross(rt, fwd);

    // Roll rotation
    float cr = cos(u_rotate), sr = sin(u_rotate);
    vec3 rr = cr * rt + sr * up;
    vec3 ru = -sr * rt + cr * up;

    vec3 rd = normalize(fwd + uv.x * rr + uv.y * ru);

    // Stars-only bypass
    if (u_starsOnly > 0.5) {
        vec3 s = starField(rd);
        gl_FragColor = vec4(pow(s, vec3(0.45)), 1.0);
        return;
    }

    // ──── Geodesic integration ────
    vec3 pos = eye;
    vec3 vel = rd;

    // Angular momentum (conserved along Schwarzschild geodesic)
    vec3 Lvec = cross(pos, vel);
    float L2 = dot(Lvec, Lvec);

    vec4 diskAccum = vec4(0.0);
    vec3 glow = vec3(0.0);
    bool absorbed = false;
    int diskCrossings = 0;
    float minR = 1000.0; // track closest approach for photon ring

    // Pre-compute loop invariant
    float gravCoeff = -1.5 * RS * L2;

    for (int i = 0; i < 200; i++) {
        float r = length(pos);

        // Adaptive step: fine near BH, coarse far away
        float h = 0.16 * clamp(r - 0.4 * RS, 0.06, 3.5);

        // Schwarzschild geodesic: a = -1.5·RS·L²/r⁵ · x
        float invR2 = 1.0 / (r * r);
        float invR5 = invR2 * invR2 / r;
        vec3 acc = (gravCoeff * invR5) * pos;

        // Velocity-Verlet integration (symplectic, energy-preserving)
        vec3 p1 = pos + vel * h + 0.5 * acc * h * h;
        float r1 = length(p1);
        float invR12 = 1.0 / (r1 * r1);
        float invR15 = invR12 * invR12 / r1;
        vec3 acc1 = (gravCoeff * invR15) * p1;
        vec3 v1 = vel + 0.5 * (acc + acc1) * h;

        // Track closest approach
        minR = min(minR, r1);

        // ── Disk crossing detection (y=0 plane) ──
        if (pos.y * p1.y < 0.0 && diskAccum.a < 0.97) {
            float t = pos.y / (pos.y - p1.y);
            vec3 hit = mix(pos, p1, t);
            vec4 dc = shadeDisk(hit, vel, u_time * u_rotationSpeed);
            dc.rgb *= u_diskIntensity;
            // 1st & 2nd crossings: full (primary disk + secondary image)
            // 3rd+ crossings: heavily attenuated (these create the crispy 1px photon ring)
            if (diskCrossings >= 2) {
                dc.rgb *= 0.15;
                dc.a *= 0.15;
            }
            // Alpha-over compositing
            diskAccum.rgb += dc.rgb * dc.a * (1.0 - diskAccum.a);
            diskAccum.a += dc.a * (1.0 - diskAccum.a);
            // Bloom spillover: bright disk regions bleed glow
            float diskBright = dot(dc.rgb, vec3(0.3, 0.5, 0.2)) * dc.a;
            glow += dc.rgb * 0.04 * max(diskBright - 0.3, 0.0);
            diskCrossings++;
        }

        // ── Glow calculations only when close to BH (negligible contribution beyond r=6) ──
        if (r1 < 6.0) {
            // Soft ambient glow near BH (very diffuse, no sharp peak)
            float pDist = abs(r1 - 1.5 * RS);
            float psGlow = 1.0 / (1.0 + pDist * pDist * 20.0) * h * 0.001 / max(r1 * r1, 0.2);
            glow += vec3(0.8, 0.6, 0.35) * psGlow;

            // Event horizon proximity glow
            float hzGlow = exp(-(r1 - RS) * 3.5) * h * 0.003;
            glow += vec3(0.5, 0.25, 0.08) * max(hzGlow, 0.0);
        }

        // ── Termination ──
        if (r1 < RS * 0.35) { absorbed = true; break; }
        // Early escape: ray moving outward past disk range, deflection negligible
        if (r1 > 25.0 && r1 > r) break;
        if (r1 > 55.0) break;

        pos = p1;
        vel = v1;
    }

    // ──── Final compositing ────
    vec3 col = vec3(0.0);
    if (!absorbed) {
        col = starField(normalize(vel));
    }
    // Disk over background
    col = col * (1.0 - diskAccum.a) + diskAccum.rgb;

    // ── Shadow-edge chromatic fringe ──
    // Replaces the old sharp 1px ring with smooth, wide RGB separation
    float ringDist = abs(minR - 1.5 * RS);
    float chromo = u_chromatic;

    // Soft wide chromatic bands: red/orange outside, blue inside
    // No center "white ring" — purely spectral separation
    float baseChroma = 0.1 + 0.5 * chromo;
    float spread = 0.08 + 0.18 * chromo;
    float falloff = 20.0 + 15.0 * (1.0 - chromo); // wider/softer bands
    float rRing = exp(-(ringDist + spread) * (ringDist + spread) * falloff);
    float bRing = exp(-(ringDist - spread) * (ringDist - spread) * falloff);
    col.r += rRing * 0.3 * baseChroma;
    col.b += bRing * 0.35 * baseChroma;

    // Glow additive
    col += glow;

    // Filmic tone mapping (ACES-inspired) + contrast
    col *= 1.4;
    vec3 a = col * (col + 0.0245786) - 0.000090537;
    vec3 b = col * (0.983729 * col + 0.4329510) + 0.238081;
    col = a / b;

    col = smoothstep(0.0, 1.0, col);
    col = pow(max(col, 0.0), vec3(0.92));

    gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uRotationSpeed = gl.getUniformLocation(prog, 'u_rotationSpeed');
  var uDiskIntensity = gl.getUniformLocation(prog, 'u_diskIntensity');
  var uStarsOnly = gl.getUniformLocation(prog, 'u_starsOnly');
  var uTilt = gl.getUniformLocation(prog, 'u_tilt');
  var uRotate = gl.getUniformLocation(prog, 'u_rotate');
  var uBhCenter = gl.getUniformLocation(prog, 'u_bhCenter');
  var uBhScale = gl.getUniformLocation(prog, 'u_bhScale');
  var uChromatic = gl.getUniformLocation(prog, 'u_chromatic');

  var rotationSpeedVal = 0.3;
  var diskIntensityVal = 1.0;
  var starsOnlyVal = 0.0;
  var tiltVal = 0.0;
  var rotateVal = 0.0;
  var bhCenterX = 0.0;
  var bhCenterY = 0.0;
  var bhScaleVal = 0.0;
  var chromaticVal = 0.0;

  // Mouse drag to control viewing angle
  var mouseDown = false;
  var lastMX = 0, lastMY = 0;
  canvas.addEventListener('mousedown', function(e) { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
  canvas.addEventListener('mousemove', function(e) {
    if (mouseDown) {
      tiltVal += (e.clientY - lastMY) * 0.003;
      rotateVal += (e.clientX - lastMX) * 0.003;
      tiltVal = Math.max(-0.8, Math.min(0.8, tiltVal));
      lastMX = e.clientX; lastMY = e.clientY;
    }
  });
  canvas.addEventListener('mouseup', function() { mouseDown = false; });
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); mouseDown = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (mouseDown) {
      tiltVal += (e.touches[0].clientY - lastMY) * 0.003;
      rotateVal += (e.touches[0].clientX - lastMX) * 0.003;
      tiltVal = Math.max(-0.8, Math.min(0.8, tiltVal));
      lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    }
  }, { passive: false });
  canvas.addEventListener('touchend', function() { mouseDown = false; });

  var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  var needsResize = true;
  var running = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) return;
    if (needsResize) resize();
    var t = prefersReduced ? 0.0 : now * 0.001;
    gl.uniform1f(uTime, t);
    gl.uniform1f(uRotationSpeed, rotationSpeedVal);
    gl.uniform1f(uDiskIntensity, diskIntensityVal);
    gl.uniform1f(uStarsOnly, starsOnlyVal);
    gl.uniform1f(uTilt, tiltVal);
    gl.uniform1f(uRotate, rotateVal);
    gl.uniform2f(uBhCenter, bhCenterX, bhCenterY);
    gl.uniform1f(uBhScale, bhScaleVal);
    gl.uniform1f(uChromatic, chromaticVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      running = false;
    } else {
      running = true;
      requestAnimationFrame(render);
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'ROTATION_SPEED': rotationSpeedVal = e.data.value; break;
        case 'DISK_INTENSITY': diskIntensityVal = e.data.value; break;
        case 'STARS_ONLY': starsOnlyVal = e.data.value; break;
        case 'TILT': tiltVal = e.data.value; break;
        case 'ROTATE': rotateVal = e.data.value; break;
        case 'BH_CENTER_X': bhCenterX = e.data.value; break;
        case 'BH_CENTER_Y': bhCenterY = e.data.value; break;
        case 'BH_SCALE': bhScaleVal = e.data.value; break;
        case 'CHROMATIC': chromaticVal = e.data.value; break;
      }
    }
  });
})();
</script>
</body>
</html>

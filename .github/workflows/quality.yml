name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - feature/typescript-7-preview-experiment

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run primary quality gate
        run: pnpm ci:quality

      - name: Run experimental type-aware lint
        run: pnpm lint:type-aware
        continue-on-error: true
